<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Art &amp; Craft Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: var(--white);">

    <!-- Checkout Header -->
    <header style="padding: 1.5rem 5%; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;">
        <a href="index.html" class="logo" style="font-family: var(--font-heading); font-size: 1.5rem; font-weight: 700; color: var(--primary);"><img src="assets/images/logo.svg" alt="Logo" style="height:32px; vertical-align:middle; margin-right:8px;">Art &amp; Craft</a>
        <span style="font-size: 0.85rem; color: #64748b; display: flex; align-items: center; gap: 0.5rem;">
            🔒 Secure Checkout
        </span>
    </header>

    <div class="cart-layout" style="padding-top: 2rem;">
        
        <!-- Checkout Steps & Form -->
        <div>
            <div class="checkout-steps">
                <span class="step active">1. Shipping</span>
                <span class="step">2. Payment</span>
                <span class="step">3. Confirmation</span>
            </div>

            <form class="checkout-form">
                <h3 style="margin-bottom: 1.5rem; font-size: 1.25rem;">Shipping Address</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" placeholder="Julianne">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" placeholder="Moore">
                    </div>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input type="text" placeholder="123 Artisanal Way, Studio B">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" placeholder="Florence">
                    </div>
                    <div class="form-group">
                        <label>Postal Code</label>
                        <input type="text" placeholder="50121">
                    </div>
                </div>
                
                <div class="form-group" style="display: flex; gap: 0.5rem; align-items: center;">
                    <input type="checkbox" id="save-address" style="width: auto;">
                    <label for="save-address" style="margin: 0; font-weight: 400; color: #475569;">Save this address for future purchases</label>
                </div>

                <h3 style="margin: 2.5rem 0 1.5rem; font-size: 1.25rem;">Payment Method</h3>
                
                <div class="payment-method">
                    <input type="radio" name="payment" id="card" checked>
                    <label for="card" style="margin: 0;">Credit or Debit Card</label>
                </div>
                <div style="padding: 1.5rem; border: 1px solid #cbd5e1; border-top: none; border-radius: 0 0 var(--radius) var(--radius); margin-top: -1rem; background-color: var(--bg); margin-bottom: 1rem;">
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" placeholder="0000 0000 0000 0000" style="background:var(--white);">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <input type="text" placeholder="MM/YY" style="background:var(--white);">
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <input type="text" placeholder="123" style="background:var(--white);">
                        </div>
                    </div>
                </div>

                <div class="payment-method">
                    <input type="radio" name="payment" id="cod">
                    <label for="cod" style="margin: 0;">Cash on Delivery (COD)</label>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 3rem;">
                    <a href="cart.html" style="color: #64748b;">← Back to Cart</a>
                    <button type="button" class="btn btn-primary" onclick="alert('Order placed successfully! Redirecting...'); window.location.href='index.html';">Complete Purchase</button>
                </div>
            </form>
        </div>

        <!-- Order Summary side -->
        <div class="order-summary" style="background-color: var(--bg); box-shadow: none;">
            <h3 style="margin-bottom: 1.5rem; font-size: 1.25rem;">Order Summary</h3>
            <!-- compact items -->
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <div style="width: 60px; height: 60px; background: #cbd5e1; border-radius: var(--radius);"></div>
                <div style="flex: 1;">
                    <p style="font-weight: 500; font-size: 0.9rem;">Indigo Tide Vessel</p>
                    <p style="color: #64748b; font-size: 0.8rem;">Qty: 1</p>
                </div>
                <p style="font-weight: 500;">₹1,240</p>
            </div>
            <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                <div style="width: 60px; height: 60px; background: #cbd5e1; border-radius: var(--radius);"></div>
                <div style="flex: 1;">
                    <p style="font-weight: 500; font-size: 0.9rem;">Midnight Weave Throw</p>
                    <p style="color: #64748b; font-size: 0.8rem;">Qty: 2</p>
                </div>
                <p style="font-weight: 500;">₹4,370</p>
            </div>

            <hr style="border: none; border-top: 1px solid #cbd5e1; margin-bottom: 1.5rem;">

            <div class="summary-row">
                <span>Subtotal</span>
                <span>₹5,610</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>₹150</span>
            </div>
            <div class="summary-row">
                <span>Taxes</span>
                <span>₹320</span>
            </div>
            <div class="summary-total" style="border-color: #cbd5e1;">
                <span>Total</span>
                <span>₹6,080</span>
            </div>
        </div>

    </div>

</body>
</html>
