<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Gallery | Artisanat Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <a href="index.html" class="auth-logo-text">Artisanat Gallery</a>

        <div class="auth-card">
            <div class="floating-badge">
                Hand-built<br>Legacy
            </div>

            <div class="auth-card-header">
                <h1>Join the Gallery</h1>
                <p>Begin your journey into a world of curated<br>craftsmanship and rare finds.</p>
            </div>

            <form action="account.html" method="GET">
                <div class="auth-form-group">
                    <label class="auth-label" for="fullname">Full Name</label>
                    <div class="auth-input-wrap">
                        <input type="text" id="fullname" class="auth-input" placeholder="Elias Thorne" required>
                    </div>
                </div>

                <div class="auth-form-group">
                    <label class="auth-label" for="email">Email Address</label>
                    <div class="auth-input-wrap">
                        <input type="email" id="email" class="auth-input" placeholder="elias@example.com" required>
                    </div>
                </div>

                <div class="auth-form-group">
                    <label class="auth-label" for="password">Password</label>
                    <div class="auth-input-wrap">
                        <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="auth-icon-right"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </div>
                </div>

                <div class="auth-checkbox-group" style="margin-top: 1.5rem;">
                    <input type="checkbox" id="newsletter">
                    <label for="newsletter">Subscribe to our artisanal newsletter for exclusive collection previews and artist stories.</label>
                </div>

                <div class="auth-checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="#" class="auth-link">Terms of Service</a> and Privacy Policy.</label>
                </div>

                <button type="submit" class="btn btn-primary auth-btn">Create Account</button>
            </form>

            <div class="auth-footer">
                Already a member? <a href="login.html">Sign In</a>
            </div>
        </div>

        <div class="auth-bottom-text">
            &copy; 2024 Artisanat Gallery. Hand-built for the discerning collector.
        </div>
    </div>

</body>
</html>
