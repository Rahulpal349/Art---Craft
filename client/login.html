<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Artisanat Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <a href="index.html" class="auth-logo-text">Artisanat Gallery</a>

        <div class="auth-card">
            <div class="auth-card-header">
                <h1>Welcome Back</h1>
                <p>Sign in to manage your collection.</p>
            </div>

            <form action="account.html" method="GET">
                <div class="auth-form-group">
                    <label class="auth-label" for="email">Email Address</label>
                    <div class="auth-input-wrap">
                        <input type="email" id="email" class="auth-input" placeholder="collector@artisanat.com" required>
                    </div>
                </div>

                <div class="auth-form-group">
                    <div class="auth-label">
                        <label for="password">Password</label>
                        <a href="forgot-password.html" class="auth-link" style="font-size: 0.75rem;">Forgot Password?</a>
                    </div>
                    <div class="auth-input-wrap">
                        <input type="password" id="password" class="auth-input" placeholder="••••••••" required>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="auth-icon-right"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </div>
                </div>

                <div class="auth-checkbox-group" style="margin-top: 1.5rem;">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me for 30 days</label>
                </div>

                <button type="submit" class="btn btn-primary auth-btn">Sign In</button>
            </form>

            <div class="auth-footer">
                New to the Gallery? <a href="signup.html">Create an Account</a>
            </div>
        </div>

        <div class="auth-bottom-text">
            &copy; 2024 Artisanat Gallery. Hand-built for the discerning collector.
        </div>
    </div>

</body>
</html>
