<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Artisanat Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="auth-wrapper">
        <a href="index.html" class="auth-logo-text">Artisanat Gallery</a>

        <div class="auth-card">
            <div class="auth-icon-top">
                <div>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12v5a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-5"></path><path d="M7 10V7a5 5 0 0 1 10 0v3"></path><path d="M12 10v4"></path></svg>
                </div>
            </div>

            <div class="auth-card-header">
                <h1>Reset Your Password</h1>
                <p>Enter your email address and we will send<br>you a link to reset your password.</p>
            </div>

            <form action="#" method="POST">
                <div class="auth-form-group">
                    <label class="auth-label" for="email">Email Address</label>
                    <div class="auth-input-wrap">
                        <input type="email" id="email" class="auth-input" placeholder="e.g. collector@artisanat.com" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary auth-btn">Send Reset Link &rarr;</button>
            </form>

            <div class="auth-footer" style="border: none; padding-top: 1rem;">
                <a href="login.html" style="font-size: 0.85rem; font-weight: 500;">&lt; BACK TO LOGIN</a>
            </div>
        </div>

        <div class="auth-bottom-text">
            &copy; 2024 Artisanat Gallery. Hand-built for the discerning collector.
        </div>
    </div>

</body>
</html>
