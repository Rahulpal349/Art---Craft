<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Art &amp; Craft Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../assets/images/logo.png" alt="Logo" style="height:32px; vertical-align:middle; margin-right:8px;">Art &amp; Craft Staff
            </div>
            <ul class="sidebar-nav">
                <li><a href="dashboard.html">Overview</a></li>
                <li><a href="products.html" class="active">Products</a></li>
                <li><a href="orders.html">Orders</a></li>
                <li><a href="customers.html">Customers</a></li>
                <li><a href="settings.html">Settings</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <span>Products Management</span>
                <div>
                    <span>Admin User</span> | <a href="admin-login.html" style="color: #64748b; text-decoration: none;">Logout</a>
                </div>
            </header>

            <div class="content-area">
                <div class="table-container">
                    <div class="table-header">
                        <h2>All Products</h2>
                        <button class="btn-primary" onclick="document.getElementById('add-product-form').style.display='block'">+ Add Product</button>
                    </div>

                    <div id="add-product-form" style="display:none; background:#f8fafc; padding:1.5rem; border-radius:8px; margin-bottom:1.5rem; border:1px solid #e2e8f0;">
                        <h3 style="margin-bottom:1rem;">Add New Product</h3>
                        <form id="productForm" style="display:flex; gap:1rem; flex-wrap:wrap; align-items:center;">
                            <input type="text" id="p_name" placeholder="Product Name" required style="padding:0.5rem; border:1px solid #cbd5e1; border-radius:4px; flex:1; min-width:200px;">
                            <input type="number" id="p_price" placeholder="Price" required style="padding:0.5rem; border:1px solid #cbd5e1; border-radius:4px; width:100px;">
                            <select id="p_category" required style="padding:0.5rem; border:1px solid #cbd5e1; border-radius:4px;">
                                <option value="">Category</option>
                                <option value="Ceramics">Ceramics</option>
                                <option value="Textiles">Textiles</option>
                                <option value="Art">Art</option>
                            </select>
                            <input type="file" id="p_image" accept="image/*" required style="padding:0.4rem; border:1px solid #cbd5e1; border-radius:4px; background:white;">
                            <button type="submit" class="btn-primary" style="margin-left:auto;">Save Product</button>
                            <button type="button" onclick="document.getElementById('add-product-form').style.display='none'" style="padding:0.5rem 1rem; border:1px solid #cbd5e1; background:white; border-radius:4px; cursor:pointer;">Cancel</button>
                        </form>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="7" style="text-align: center; padding: 2rem;">Loading products...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.textContent = 'Uploading...';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('name', document.getElementById('p_name').value);
            formData.append('price', document.getElementById('p_price').value);
            formData.append('category', document.getElementById('p_category').value);
            formData.append('image', document.getElementById('p_image').files[0]);

            try {
                const res = await fetch('/api/products', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    alert('Product uploaded successfully!');
                    location.reload();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (err) {
                alert('Error uploading product');
                console.error(err);
            } finally {
                btn.textContent = 'Save Product';
                btn.disabled = false;
            }
        });

        async function fetchAdminProducts() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                const tbody = document.querySelector('tbody');
                tbody.innerHTML = '';
                
                if(products.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 2rem;">No products found.</td></tr>';
                    return;
                }

                products.forEach(p => {
                    const imgHtml = p.image ? `<img src="${p.image}" style="width: 40px; height: 40px; border-radius: 4px; object-fit: cover;">` : '<div style="width: 40px; height: 40px; background: #cbd5e1; border-radius: 4px;"></div>';
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${imgHtml}</td>
                        <td>${p.name}</td>
                        <td>${p.category || 'N/A'}</td>
                        <td>₹${p.price}</td>
                        <td>--</td>
                        <td><span class="badge badge-success">Active</span></td>
                        <td>
                            <button style="border:none; background:transparent; color:#3b82f6; cursor:pointer; margin-right:0.5rem;">Edit</button>
                            <button style="border:none; background:transparent; color:#ef4444; cursor:pointer;">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error('Failed to load admin products', err);
                document.querySelector('tbody').innerHTML = '<tr><td colspan="7" style="color: red; text-align: center;">Error loading products.</td></tr>';
            }
        }
        
        document.addEventListener('DOMContentLoaded', fetchAdminProducts);
    </script>
</body>
</html>
