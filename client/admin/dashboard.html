<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Art &amp; Craft</title>
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div>
                <div class="sidebar-header">
                    <img src="../assets/images/logo.svg" alt="Logo" style="height: 32px; filter: brightness(0) invert(1);">
                    <h2>Artisanat Admin</h2>
                </div>
                <ul class="sidebar-nav">
                    <li><a href="dashboard.html" class="active">Dashboard</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="orders.html" >Orders</a></li>
                    <li><a href="customers.html">Customers</a></li>
                </ul>
            </div>
        </aside>

        <main class="main-content">
                        <header class="topbar">
                <div class="topbar-search">
                    <span style="color:#64748b;">&#128269;</span>
                    <input type="text" placeholder="Search...">
                </div>
                <div class="topbar-actions">
                    <button class="icon-btn">&#128276;</button>
                    <button class="icon-btn">&#9711;</button>
                </div>
            </header>

            <div class="content-area">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Revenue</h3>
                        <div class="value">₹0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Orders</h3>
                        <div class="value">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Products</h3>
                        <div class="value">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Customers</h3>
                        <div class="value">0</div>
                    </div>
                </div>

                <div class="table-container">
                    <div class="table-header">
                        <h2>Recent Orders</h2>
                        <a href="orders.html" class="btn-primary" style="background: transparent; color: var(--primary); border: 1px solid var(--primary);">View All</a>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Date</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 2rem; color: #64748b;">No recent orders.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
