<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders | Art &amp; Craft Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
            <img src="../assets/images/logo.svg" alt="Logo" style="height: 32px; filter: brightness(0) invert(1);">
            <h2>Artisanat Admin</h2>
        </div>
            <ul class="sidebar-nav">
                <li><a href="dashboard.html">Overview</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="orders.html" class="active">Orders</a></li>
                <li><a href="customers.html">Customers</a></li>
                <li><a href="settings.html">Settings</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <span>Order Management</span>
                <div>
                    <span>Admin User</span> | <a href="admin-login.html" style="color: #64748b; text-decoration: none;">Logout</a>
                </div>
            </header>

            <div class="content-area">
                <div class="table-container">
                    <div class="table-header">
                        <h2>All Orders</h2>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Date</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>#ORD-092</td>
                                <td>Sarah Jenkins</td>
                                <td>Oct 12, 2026</td>
                                <td>₹5,610</td>
                                <td><span class="badge badge-warning">Processing</span></td>
                                <td>
                                    <select style="padding: 0.25rem; border: 1px solid #cbd5e1; border-radius: 4px;">
                                        <option>Processing</option>
                                        <option>Shipped</option>
                                        <option>Delivered</option>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <td>#ORD-091</td>
                                <td>Michael Chang</td>
                                <td>Oct 11, 2026</td>
                                <td>₹2,100</td>
                                <td><span class="badge badge-success">Shipped</span></td>
                                <td>
                                    <select style="padding: 0.25rem; border: 1px solid #cbd5e1; border-radius: 4px;">
                                        <option>Processing</option>
                                        <option selected>Shipped</option>
                                        <option>Delivered</option>
                                    </select>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
