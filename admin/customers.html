<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers | Art &amp; Craft Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div>
                <div class="sidebar-header">
                    <img src="assets/images/logo.svg" alt="Logo" style="height: 32px; filter: brightness(0) invert(1);">
                    <h2>Artisanat Admin</h2>
                </div>
                <ul class="sidebar-nav">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="orders.html">Orders</a></li>
                    <li><a href="customers.html" class="active">Customers</a></li>
                </ul>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-search">
                    <span style="color:#64748b;">&#128269;</span>
                    <input type="text" placeholder="Search customers...">
                </div>
                <div class="topbar-actions">
                    <button class="icon-btn">&#128276;</button>
                    <button class="icon-btn">&#9711;</button>
                </div>
            </header>

            <div class="content-area">
                <div class="table-container">
                    <div class="table-header">
                        <h2>All Customers</h2>
                        <button class="btn-primary">+ Add Customer</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Join Date</th>
                                <th>Total Orders</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 2rem; color: #64748b;">No customers found.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
